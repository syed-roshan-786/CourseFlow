spring.application.name=aiquiz
server.port=5000

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/courseflow_aiquiz?createDatabaseIfNotExist=true
spring.datasource.username=YourUsernameHere
spring.datasource.password=YourPasswordHere
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI API Key (Set this in your environment variables or replace here)
openai.api.key=${OPENAI_API_KEY}
